<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5 - Rentabilidade</title>
    <link rel="stylesheet" href="atv5.css">
</head>
<body>
    <div class="painel">
        <h3>Calculadora de Investimento</h3>
        
        <label>Valor Inicial (R$):</label>
        <input type="number" id="valorInicial" placeholder="Ex: 1000.00">
        
        <label>Valor Atual (R$):</label>
        <input type="number" id="valorAtual" placeholder="Ex: 1200.00">

        <label>Tempo (meses - opcional):</label>
        <input type="number" id="meses" placeholder="Ex: 12">
        
        <button onclick="processarCalculo()">Calcular Rentabilidade</button>

        <div id="resultado" style="display: none; margin-top: 20px;">
            <hr>
            <p>Lucro Obtido: <span id="resLucro"></span></p>
            <p>Rentabilidade: <span id="resRentabilidade"></span>%</p>
            <div id="areaAnual" style="display: none;">
                <p style="color: #4CAF50; font-weight: bold;">Rentabilidade Anual: <span id="resAnual"></span>%</p>
            </div>
        </div>
    </div>

    <script src="atv5.js"></script>
    <script>
        function processarCalculo() {
            const inicial = parseFloat(document.getElementById('valorInicial').value);
            const atual = parseFloat(document.getElementById('valorAtual').value);
            const mesesInput = document.getElementById('meses').value;
            const meses = mesesInput !== "" ? parseInt(mesesInput) : undefined;
            
            const areaResultado = document.getElementById('resultado');
            const areaAnual = document.getElementById('areaAnual');

            try {
                const dados = calcularRentabilidade(inicial, atual, meses);
                
                document.getElementById('resLucro').innerText = `R$ ${dados.lucro.toFixed(2)}`;
                document.getElementById('resRentabilidade').innerText = dados.rentabilidade.toFixed(2);
                
                if (dados.rentabilidadeAnual !== null) {
                    document.getElementById('resAnual').innerText = dados.rentabilidadeAnual.toFixed(2);
                    areaAnual.style.display = 'block';
                } else {
                    areaAnual.style.display = 'none';
                }
                
                areaResultado.style.display = 'block';
            } catch (error) {
                alert(error.message);
            }
        }
    </script>
</body>
</html>
