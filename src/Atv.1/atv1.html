<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1 - Desconto</title>
    <link rel="stylesheet" href="atv1.css">
</head>
<body>
    <div class="painel">
        <h3>Calculadora de Desconto</h3>
        
        <label>Preço Original (R$):</label>
        <input type="number" id="preco" placeholder="Ex: 100.00">
        
        <label>Desconto (%):</label>
        <input type="number" id="porcentagem" placeholder="Ex: 10">
        
        <button onclick="processarCalculo()">Calcular</button>

        <div id="resultado" style="display: none; margin-top: 20px;">
            <hr>
            <p>Preço Original: <span id="resOriginal"></span></p>
            <p>Desconto: <span id="resPorcentagem"></span>%</p>
            <p>Valor Descontado: <span id="resValorDesconto"></span></p>
            <p><strong>Preço Final: <span id="resFinal"></span></strong></p>
            <p style="color: #4CAF50; font-weight: bold;">Economia: <span id="resEconomia"></span></p>
        </div>
    </div>

    <script src="atv1.js"></script>
    <script>
        function processarCalculo() {
            const preco = parseFloat(document.getElementById('preco').value);
            const desc = parseFloat(document.getElementById('porcentagem').value);
            const areaResultado = document.getElementById('resultado');

            try {
                const dados = calcularDesconto(preco, desc);
                
                document.getElementById('resOriginal').innerText = `R$ ${dados.precoOriginal.toFixed(2)}`;
                document.getElementById('resPorcentagem').innerText = dados.percentualDesconto;
                document.getElementById('resValorDesconto').innerText = `R$ ${dados.valorDesconto.toFixed(2)}`;
                document.getElementById('resFinal').innerText = `R$ ${dados.precoFinal.toFixed(2)}`;
                document.getElementById('resEconomia').innerText = `R$ ${dados.economia.toFixed(2)}`;
                
                areaResultado.style.display = 'block';
            } catch (error) {
                alert(error.message);
            }
        }
    </script>
</body>
</html>
