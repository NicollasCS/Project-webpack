<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1 - Desconto</title>
    <link rel="stylesheet" href="atv1.css">
</head>
<body>
    <div class="painel">
        <h3>Calculadora de Desconto</h3>
        
        <label>Preço Original (R$):</label>
        <input type="number" id="preco" placeholder="Ex: 100.00">
        
        <label>Desconto (%):</label>
        <input type="number" id="porcentagem" placeholder="Ex: 10">
        
        <button onclick="processarCalculo()">Calcular</button>

        <div id="resultado" style="display: none; margin-top: 20px;">
            <hr>
            <p>Preço Original: <span id="resOriginal"></span></p>
            <p>Desconto: <span id="resPorcentagem"></span>%</p>
            <p>Valor Descontado: <span id="resValorDesconto"></span></p>
            <p><strong>Preço Final: <span id="resFinal"></span></strong></p>
            <p style="color: #4CAF50; font-weight: bold;">Economia: <span id="resEconomia"></span></p>
        </div>
    </div>

    <script src="atv1.js"></script>
</body>
</html>
