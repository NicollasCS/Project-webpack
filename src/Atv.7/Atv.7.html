<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Bitcoin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .resultado {
      margin-top: 15px;
      padding: 10px;
      background: #020617;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>💰 Bitcoin Calc</h2>

  <input type="number" id="btc" placeholder="Quantidade de BTC">
  <input type="number" id="preco" placeholder="Preço do BTC (R$)">
  <input type="number" id="investido" placeholder="Valor investido (opcional)">

  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="resultado"></div>
</div>

<script>
  function calcular() {
    let btc = parseFloat(document.getElementById("btc").value);
    let preco = parseFloat(document.getElementById("preco").value);
    let investido = parseFloat(document.getElementById("investido").value);

    if (isNaN(btc) || isNaN(preco)) {
      alert("Preencha a quantidade de BTC e o preço corretamente!");
      return;
    }

    let total = btc * preco;

    let resultado = `
      <p><strong>BTC:</strong> ${btc}</p>
      <p><strong>Preço atual:</strong> R$ ${preco.toFixed(2)}</p>
      <p><strong>Valor total:</strong> R$ ${total.toFixed(2)}</p>
    `;

    if (!isNaN(investido)) {
      let lucro = total - investido;
      let rentabilidade = (lucro / investido) * 100;

      resultado += `
        <p><strong>Lucro/Prejuízo:</strong> R$ ${lucro.toFixed(2)}</p>
        <p><strong>Rentabilidade:</strong> ${rentabilidade.toFixed(2)}%</p>
      `;
    }

    document.getElementById("resultado").innerHTML = resultado;
  }
</script>

</body>
</html>
