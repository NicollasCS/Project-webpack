<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4 - Cálculo de Lucro</title>
    <link rel="stylesheet" href="atv4.css">
</head>
<body>
    <div class="painel">
        <h3>Gestão de Lucros</h3>
        
        <label>Custo do Produto (R$):</label>
        <input type="number" id="custo" placeholder="Ex: 50.00">
        
        <label>Preço de Venda (R$):</label>
        <input type="number" id="venda" placeholder="Ex: 80.00">
        
        <button onclick="processarCalculo()">Calcular Resultado</button>

        <div id="resultado" style="display: none; margin-top: 20px;">
            <hr>
            <p>Custo: <span id="resCusto"></span></p>
            <p>Venda: <span id="resVenda"></span></p>
            <p><strong>Lucro/Prejuízo: <span id="resLucro"></span></strong></p>
            <p>Margem de Lucro: <span id="resMargem"></span>%</p>
        </div>
    </div>

    <script src="atv4.js"></script>
    <script>
        function processarCalculo() {
            const custo = parseFloat(document.getElementById('custo').value);
            const venda = parseFloat(document.getElementById('venda').value);
            const areaResultado = document.getElementById('resultado');

            try {
                const dados = calcularLucro(custo, venda);
                
                document.getElementById('resCusto').innerText = `R$ ${dados.custo.toFixed(2)}`;
                document.getElementById('resVenda').innerText = `R$ ${dados.venda.toFixed(2)}`;
                document.getElementById('resLucro').innerText = `R$ ${dados.lucro.toFixed(2)}`;
                document.getElementById('resMargem').innerText = dados.margemLucro.toFixed(2);
                
                // Mudar cor se for prejuízo
                document.getElementById('resLucro').style.color = dados.lucro < 0 ? "red" : "#4CAF50";
                
                areaResultado.style.display = 'block';
            } catch (error) {
                alert(error.message);
            }
        }
    </script>
</body>
</html>
